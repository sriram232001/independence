<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Happy Independence Day India</title>
  <style>
    :root {
      --saffron: #ff9933;
      --white: #ffffff;
      --green: #138808;
      --navy: #002868; /* deep blue for chakra */
      --bg: #0c1117;   /* deep background for contrast */
    }

    /* Reset */
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, "Helvetica Neue", Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: #e6edf3;
      background: radial-gradient(1200px 700px at 80% -10%, rgba(255,153,51,0.18), transparent 60%),
                  radial-gradient(1200px 700px at 20% 110%, rgba(19,136,8,0.18), transparent 60%),
                  var(--bg);
      overflow: hidden;
    }

    /* Subtle floating particles */
    .spark {
      position: absolute; inset: 0; pointer-events: none; overflow: hidden;
      background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255,153,51,0.8) 50%, transparent 51%),
        radial-gradient(2px 2px at 60% 70%, rgba(19,136,8,0.8) 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 80% 20%, rgba(255,255,255,0.8) 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 35% 85%, rgba(0,40,104,0.8) 50%, transparent 51%);
      background-repeat: no-repeat;
      animation: drift 18s linear infinite;
      opacity: .5;
    }
    @keyframes drift {
      from { transform: translateY(0); }
      to   { transform: translateY(-40px); }
    }

    /* Tricolour waves */
    .waves {
      position: absolute; inset: 0; pointer-events: none;
    }
    .wave {
      position: absolute; left: -10%; width: 120%; height: 22vh; filter: blur(1px);
      opacity: 0.8; mix-blend-mode: screen;
      background: currentColor;
      border-radius: 0 0 100% 100% / 0 0 40% 40%;
      transform-origin: left center;
      animation: wave 9s ease-in-out infinite;
    }
    .wave.saffron { color: rgba(255,153,51,0.6); top: -6vh; animation-delay: -1s; }
    .wave.white   { color: rgba(255,255,255,0.5); top: 8vh;  animation-delay: -2.2s; }
    .wave.green   { color: rgba(19,136,8,0.6);  top: 22vh; animation-delay: -3.4s; }

    @keyframes wave {
      0%,100% { transform: translateX(0) rotate(0.6deg); }
      50%     { transform: translateX(-3%) rotate(-0.6deg); }
    }

    main {
      position: relative; z-index: 1; height: 100%;
      display: grid; place-items: center; padding: 2rem;
      text-align: center;
    }

    .card {
      width: min(980px, 96vw);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: clamp(1.25rem, 2.5vw, 2.5rem);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }

    .heading {
      line-height: 1.1;
      font-weight: 800;
      font-size: clamp(1.8rem, 4.2vw + 0.5rem, 4rem);
      margin: 0 0 .4rem 0;
      letter-spacing: .3px;
      background: linear-gradient(90deg, var(--saffron), var(--white) 50%, var(--green));
      -webkit-background-clip: text; background-clip: text; color: transparent;
      text-shadow: 0 1px 10px rgba(255,255,255,0.1);
    }

    .sub {
      margin: 0 auto 1rem; max-width: 60ch;
      color: #c9d1d9;
      font-size: clamp(0.95rem, 1.1vw + 0.4rem, 1.25rem);
    }

    /* Chakra + flag pole */
    .emblem {
      margin: 1.1rem auto 0; width: clamp(120px, 26vw, 220px); height: auto;
      display: block; filter: drop-shadow(0 6px 12px rgba(0,0,0,.35));
      animation: float 5.5s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-6px); }
    }

    .date-badge {
      display: inline-flex; gap: .6rem; align-items: baseline;
      margin-top: 1.1rem; padding: .5rem .9rem;
      border: 1px dashed rgba(255,255,255,0.25);
      border-radius: 999px; font-weight: 600; letter-spacing: .4px;
      background: rgba(255,255,255,0.06);
    }
    .date-badge .d1 { color: var(--saffron); }
    .date-badge .d2 { color: var(--navy); }
    .date-badge .d3 { color: var(--green); }

    footer { margin-top: 1.25rem; font-size: .9rem; opacity: .8; }

    /* Accessibility: respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .spark, .wave, .emblem { animation: none !important; }
    }
  </style>
</head>
<body>
  <!-- Decorative background elements -->
  <div class="spark" aria-hidden="true"></div>
  <div class="waves" aria-hidden="true">
    <div class="wave saffron"></div>
    <div class="wave white"></div>
    <div class="wave green"></div>
  </div>

  <main>
    <section class="card" aria-labelledby="title">
      <h1 id="title" class="heading" aria-label="Happy Independence Day India">
        Happy Independence Day
        <span role="img" aria-label="India flag">🇮🇳</span>
      </h1>
      <p class="sub">Wishing everyone peace, unity, and progress. Let's celebrate the spirit of freedom and the values that bind us together.</p>

      <!-- Ashoka Chakra (SVG) -->
      <svg class="emblem" viewBox="0 0 200 200" role="img" aria-label="Ashoka Chakra with 24 spokes">
        <defs>
          <linearGradient id="rim" x1="0" x2="1">
            <stop offset="0%" stop-color="#001a53" />
            <stop offset="100%" stop-color="var(--navy)" />
          </linearGradient>
        </defs>
        <!-- Outer rim -->
        <circle cx="100" cy="100" r="92" fill="none" stroke="url(#rim)" stroke-width="8" />
        <!-- Hub -->
        <circle cx="100" cy="100" r="12" fill="var(--navy)" />
        <!-- 24 spokes -->
        <g stroke="var(--navy)" stroke-width="4" stroke-linecap="round">
          <!-- We'll draw one spoke and rotate it 24 times -->
          <g id="spoke">
            <line x1="100" y1="100" x2="100" y2="16" />
          </g>
          <!-- Use transform to clone at 15° intervals -->
          <use href="#spoke" transform="rotate(15,100,100)" />
          <use href="#spoke" transform="rotate(30,100,100)" />
          <use href="#spoke" transform="rotate(45,100,100)" />
          <use href="#spoke" transform="rotate(60,100,100)" />
          <use href="#spoke" transform="rotate(75,100,100)" />
          <use href="#spoke" transform="rotate(90,100,100)" />
          <use href="#spoke" transform="rotate(105,100,100)" />
          <use href="#spoke" transform="rotate(120,100,100)" />
          <use href="#spoke" transform="rotate(135,100,100)" />
          <use href="#spoke" transform="rotate(150,100,100)" />
          <use href="#spoke" transform="rotate(165,100,100)" />
          <use href="#spoke" transform="rotate(180,100,100)" />
          <use href="#spoke" transform="rotate(195,100,100)" />
          <use href="#spoke" transform="rotate(210,100,100)" />
          <use href="#spoke" transform="rotate(225,100,100)" />
          <use href="#spoke" transform="rotate(240,100,100)" />
          <use href="#spoke" transform="rotate(255,100,100)" />
          <use href="#spoke" transform="rotate(270,100,100)" />
          <use href="#spoke" transform="rotate(285,100,100)" />
          <use href="#spoke" transform="rotate(300,100,100)" />
          <use href="#spoke" transform="rotate(315,100,100)" />
          <use href="#spoke" transform="rotate(330,100,100)" />
          <use href="#spoke" transform="rotate(345,100,100)" />
        </g>
      </svg>

      <div class="date-badge" aria-label="15 August, India Independence Day">
        <span class="d1">15</span>
        <span class="d2">August</span>
        <span class="d3">India</span>
      </div>

      <footer>
        Made with <span aria-hidden="true">❤</span> using only HTML & CSS. Share and celebrate responsibly.
      </footer>
    </section>
  </main>
</body>
</html>
